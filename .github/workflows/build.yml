name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check src/ tests/

  test-and-package:
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project (with dev group)
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke-test uv tool install
        run: |
          uv tool install --force .
          test -x "$HOME/.local/bin/jt"
          test -x "$HOME/.local/bin/jt-idle-monitor"

      - name: Build wheel + sdist
        run: uv build

      - name: Stage release artifacts
        run: |
          VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          STAGE="jira-timer-$VERSION"
          mkdir -p "release/$STAGE"
          cp -R src pyproject.toml uv.lock install.sh README.md ARCHITECTURE.md plugins launchd "release/$STAGE/"
          tar -czf "release/jira-timer-$VERSION.tar.gz" -C release "$STAGE"
          cp dist/jira_timer-$VERSION-py3-none-any.whl release/
          cp dist/jira_timer-$VERSION.tar.gz release/jira_timer-$VERSION.sdist.tar.gz
          cd release
          shasum -a 256 jira-timer-$VERSION.tar.gz jira_timer-$VERSION-py3-none-any.whl jira_timer-$VERSION.sdist.tar.gz > SHA256SUMS
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jira-timer-${{ env.VERSION }}
          path: |
            release/jira-timer-*.tar.gz
            release/jira_timer-*.whl
            release/jira_timer-*.sdist.tar.gz
            release/SHA256SUMS
          retention-days: 90

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/jira-timer-*.tar.gz
            release/jira_timer-*.whl
            release/jira_timer-*.sdist.tar.gz
            release/SHA256SUMS
          generate_release_notes: true
